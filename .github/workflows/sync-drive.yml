name: Sync Google Drive → Dashboard

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Důvod spuštění'
        default: 'automatický trigger z Google Drive'
  push:
    branches:
      - main
    paths:
      - 'data/**'
      - '*.html'

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main větve
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Nastavení Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Stažení CSV z Google Drive (pouze manuální spuštění)
        if: github.event_name == 'workflow_dispatch'
        env:
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          pip install google-api-python-client google-auth
          python .github/scripts/download_from_drive.py
          git config user.name "FTK GPS Bot"
          git config user.email "bot@ftk-gps.cz"
          git add data/
          if git diff --staged --quiet; then
            echo "Žádné nové soubory z Drive"
          else
            POCET=$(git diff --staged --name-only | wc -l)
            git commit -m "📊 Aktualizace dat z Drive: $POCET souborů [$(date '+%d.%m.%Y %H:%M')]"
            git push origin main
          fi

      - name: Generuj index.json (při push triggeru)
        if: github.event_name == 'push'
        run: |
          import json, pathlib
          data_dir = pathlib.Path('data')
          csv_files = sorted([f.name for f in data_dir.glob('*.csv')])
          index = {'files': csv_files, 'count': len(csv_files)}
          (data_dir / 'index.json').write_text(json.dumps(index, indent=2))
          print('index.json:', len(csv_files), 'souboru')
        shell: python

      - name: Checkout gh-pages větve
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-dir
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Zkopíruj data/ a dashboard do gh-pages
        run: |
          # Zkopíruj složku data/ (CSV + index.json)
          cp -r data/. gh-pages-dir/data/
          
          # Zkopíruj dashboard HTML (nejnovější verzi z main)
          HTML=$(ls *.html 2>/dev/null | head -1)
          if [ -n "$HTML" ]; then
            cp "$HTML" gh-pages-dir/index.html
            echo "✅ Zkopírován: $HTML → index.html"
          else
            echo "⚠️  Žádný HTML soubor nenalezen v main větvi"
          fi

      - name: Commit a push do gh-pages
        run: |
          cd gh-pages-dir
          git config user.name "FTK GPS Bot"
          git config user.email "bot@ftk-gps.cz"
          git add data/ index.html
          if git diff --staged --quiet; then
            echo "Žádné změny v gh-pages"
          else
            git commit -m "🚀 Deploy: aktualizace dashboardu a dat [$(date '+%d.%m.%Y %H:%M')]"
            git push origin gh-pages
          fi
          echo "✅ gh-pages aktualizován"
