
name: Sync Google Drive → Dashboard

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'data/**'
      - '*.html'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4.2.2
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout gh-pages
        uses: actions/checkout@v4.2.2
        with:
          ref: gh-pages
          path: gh-pages-dir
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Synchronizuj data a HTML
        run: |
          mkdir -p gh-pages-dir/data
          cp data/*.csv gh-pages-dir/data/ 2>/dev/null || true
          HTML=$(ls *.html 2>/dev/null | head -1)
          [ -n "$HTML" ] && cp "$HTML" gh-pages-dir/index.html

      - name: Konvertuj CSV do UTF-8
        run: |
          python3 << 'PYEOF'
          import os, glob
          for fpath in sorted(glob.glob('gh-pages-dir/data/*.csv')):
              with open(fpath, 'rb') as fp:
                  raw = fp.read()
              # Zkus UTF-8
              try:
                  raw.decode('utf-8')
                  continue  # OK, nic nedělej
              except UnicodeDecodeError:
                  pass
              # Zkus windows-1250
              try:
                  text = raw.decode('windows-1250')
                  with open(fpath, 'w', encoding='utf-8') as fp:
                      fp.write(text)
                  print('Konvertovan:', fpath)
              except Exception as e:
                  print('SKIP:', fpath, e)
          PYEOF

      - name: Generuj index.json
        run: python3 -c "import json,os; d='gh-pages-dir/data'; files=sorted([f for f in os.listdir(d) if f.endswith('.csv')]); open(d+'/index.json','w').write(json.dumps({'files':files,'count':len(files)},indent=2)); print(len(files),'souboru')"

      - name: Zkopíruj index.json zpět do main
        run: |
          cp gh-pages-dir/data/index.json data/index.json
          git config user.name "FTK GPS Bot"
          git config user.email "bot@ftk-gps.cz"
          git add data/index.json
          git diff --staged --quiet || git commit -m "Aktualizace index.json" && git push origin main

      - name: Deploy gh-pages
        run: |
          cd gh-pages-dir
          git config user.name "FTK GPS Bot"
          git config user.email "bot@ftk-gps.cz"
          git add -A
          git diff --staged --quiet || git commit -m "Deploy $(date '+%d.%m.%Y %H:%M')" && git push origin gh-pages
